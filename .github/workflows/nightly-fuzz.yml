---

name: Nightly Fuzz CI

on:
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * 0,6"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: Run Fuzz Tests
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FUZZTIME: 2m
      REEVAL_RETRIES: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run fuzz suite
        shell: bash
        run: |
          set -o pipefail
          mkdir -p fuzz-logs
          make fuzz 2>&1 | tee fuzz-logs/nightly-fuzz-console.log

      - name: Upload fuzz logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-fuzz-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            fuzz-logs/
            internal/**/testdata/fuzz/
          if-no-files-found: warn
          retention-days: 30
