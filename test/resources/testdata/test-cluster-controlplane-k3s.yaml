apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: capd-k3s-test
  namespace: e2e-test
spec:
  controlPlaneRef:
    apiGroup: controlplane.cluster.x-k8s.io
    kind: KThreesControlPlane
    name: capd-k3s-test
  infrastructureRef:
    apiGroup: infrastructure.cluster.x-k8s.io
    kind: DockerCluster
    name: capd-k3s-test
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KThreesControlPlane
metadata:
  name: capd-k3s-test
  namespace: e2e-test
spec:
  version: v1.32.4+k3s1
  replicas: 1
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
      kind: DockerMachineTemplate
      name: capd-k3s-test
  kthreesConfigSpec:
    files:
      - content: |
          #!/bin/bash
          set -e
          echo "Hello, World!"
        path: /etc/hello-world.sh
        owner: root:root
